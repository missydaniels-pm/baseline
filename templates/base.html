<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Baseline{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header class="mobile-header">
  <button class="nav-toggle" id="navToggle" aria-label="Open navigation">
    <span></span><span></span><span></span>
  </button>
  <div class="mobile-brand">Base<span>line</span></div>
</header>

<div class="nav-overlay" id="navOverlay"></div>

<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">Base<span>line</span></div>
    <a href="{{ url_for('checkin') }}" class="nav-link {% if request.endpoint == 'checkin' %}active{% endif %}">
      <span class="nav-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M13 2H3a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h2v2.5L7.5 11H13a1 1 0 0 0 1-1V3a1 1 0 0 0-1-1z"/>
        </svg>
      </span> Check-in
    </a>
    <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
      <span class="nav-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 7.5L8 2l6 5.5"/>
          <path d="M3.5 6.5V14h3.5v-4h2v4h3.5V6.5"/>
        </svg>
      </span> Dashboard
    </a>
    <a href="{{ url_for('episodes') }}" class="nav-link {% if 'episode' in request.endpoint %}active{% endif %}">
      <span class="nav-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 2l1.4 4.6L14 8l-4.6 1.4L8 14l-1.4-4.6L2 8l4.6-1.4z"/>
        </svg>
      </span> Episodes
    </a>
    <a href="{{ url_for('protocols') }}" class="nav-link {% if 'protocol' in request.endpoint %}active{% endif %}">
      <span class="nav-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3.5" width="10" height="11" rx="1"/>
          <path d="M6 3.5V2.5Q6 1.5 8 1.5Q10 1.5 10 2.5V3.5"/>
          <line x1="5.5" y1="7" x2="10.5" y2="7"/>
          <line x1="5.5" y1="10" x2="9" y2="10"/>
        </svg>
      </span> Protocols
    </a>
    <a href="{{ url_for('experiments') }}" class="nav-link {% if 'experiment' in request.endpoint %}active{% endif %}">
      <span class="nav-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M6 1.5h4M6 1.5v4.5L2.5 13.5h11L10 6V1.5"/>
          <path d="M4 10.5Q8 9.5 12 10.5" stroke-opacity="0.5"/>
        </svg>
      </span> Experiments
    </a>
    <a href="{{ url_for('symptoms') }}" class="nav-link {% if 'symptom' in request.endpoint %}active{% endif %}">
      <span class="nav-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M8 13C5 11 1.5 9 1.5 5.5A3 3 0 0 1 8 4.5 3 3 0 0 1 14.5 5.5C14.5 9 11 11 8 13z"/>
        </svg>
      </span> Symptoms
    </a>
    <div class="nav-spacer"></div>
    <a href="{{ url_for('settings') }}" class="nav-link {% if request.endpoint == 'settings' %}active{% endif %}">
      <span class="nav-icon">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
          <circle cx="8" cy="8" r="2.5"/>
          <path d="M8 1.5V3M8 13v1.5M1.5 8H3M13 8h1.5M3.3 3.3l1.1 1.1M11.6 11.6l1.1 1.1M12.7 3.3l-1.1 1.1M4.4 11.6l-1.1 1.1"/>
        </svg>
      </span> Settings
    </a>
  </nav>

  <main class="main">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flashes">
          {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</div>

<script>
  // Live-update slider display values
  document.querySelectorAll('input[type="range"]').forEach(function(slider) {
    var display = document.getElementById(slider.id + '_display');
    if (display) {
      display.textContent = slider.value;
      slider.addEventListener('input', function() { display.textContent = this.value; });
    }
  });

  // Mobile navigation toggle
  var navToggle = document.getElementById('navToggle');
  var navOverlay = document.getElementById('navOverlay');

  navToggle.addEventListener('click', function() {
    document.body.classList.toggle('nav-open');
  });

  navOverlay.addEventListener('click', function() {
    document.body.classList.remove('nav-open');
  });

  document.querySelectorAll('.nav-link').forEach(function(link) {
    link.addEventListener('click', function() {
      document.body.classList.remove('nav-open');
    });
  });
</script>
</body>
</html>
