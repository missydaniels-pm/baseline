<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Baseline{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<header class="mobile-header">
  <button class="nav-toggle" id="navToggle" aria-label="Open navigation">
    <span></span><span></span><span></span>
  </button>
  <div class="mobile-brand">Base<span>line</span></div>
</header>

<div class="nav-overlay" id="navOverlay"></div>

<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-brand">Base<span>line</span></div>
    <a href="{{ url_for('index') }}" class="nav-link {% if request.endpoint == 'index' %}active{% endif %}">
      <span class="nav-icon">⌂</span> Dashboard
    </a>
    <a href="{{ url_for('episodes') }}" class="nav-link {% if 'episode' in request.endpoint %}active{% endif %}">
      <span class="nav-icon">◎</span> Episodes
    </a>
    <a href="{{ url_for('protocols') }}" class="nav-link {% if 'protocol' in request.endpoint %}active{% endif %}">
      <span class="nav-icon">⊕</span> Protocols
    </a>
    <a href="{{ url_for('experiments') }}" class="nav-link {% if 'experiment' in request.endpoint %}active{% endif %}">
      <span class="nav-icon">◆</span> Experiments
    </a>
    <a href="{{ url_for('symptoms') }}" class="nav-link {% if 'symptom' in request.endpoint %}active{% endif %}">
      <span class="nav-icon">◈</span> Symptoms
    </a>
  </nav>

  <main class="main">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="flashes">
          {% for category, message in messages %}
            <div class="flash flash-{{ category }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</div>

<script>
  // Live-update slider display values
  document.querySelectorAll('input[type="range"]').forEach(function(slider) {
    var display = document.getElementById(slider.id + '_display');
    if (display) {
      display.textContent = slider.value;
      slider.addEventListener('input', function() { display.textContent = this.value; });
    }
  });

  // Mobile navigation toggle
  var navToggle = document.getElementById('navToggle');
  var navOverlay = document.getElementById('navOverlay');

  navToggle.addEventListener('click', function() {
    document.body.classList.toggle('nav-open');
  });

  navOverlay.addEventListener('click', function() {
    document.body.classList.remove('nav-open');
  });

  document.querySelectorAll('.nav-link').forEach(function(link) {
    link.addEventListener('click', function() {
      document.body.classList.remove('nav-open');
    });
  });
</script>
</body>
</html>
