{% extends "base.html" %}
{% block title %}Edit Episode — Baseline{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Edit Episode</h1>
  <a href="{{ url_for('episodes') }}" class="btn btn-secondary">Cancel</a>
</div>

<div class="form-card">
  <form method="POST">
    <div class="form-row">
      <div class="form-group">
        <label for="onset">Onset Date & Time</label>
        <input type="datetime-local" id="onset" name="onset"
               value="{{ episode.onset.strftime('%Y-%m-%dT%H:%M') }}">
      </div>
      <div class="form-group">
        <label for="duration_hours">Duration (hours)</label>
        <input type="number" id="duration_hours" name="duration_hours"
               min="0" max="168" step="0.5"
               value="{{ episode.duration_hours or '' }}" placeholder="e.g. 4.5">
      </div>
    </div>

    <div class="form-group">
      <label for="peak_severity">Peak Severity</label>
      <div class="slider-wrap">
        <input type="range" id="peak_severity" name="peak_severity"
               min="1" max="10" value="{{ episode.peak_severity }}">
        <span class="slider-value" id="peak_severity_display">{{ episode.peak_severity }}</span>
      </div>
    </div>

    <div class="form-group">
      <label for="functional_impairment">Functional Impairment</label>
      <select id="functional_impairment" name="functional_impairment">
        <option value="">— select —</option>
        {% for val, label in [
          ('working_normally', 'Working normally'),
          ('working_reduced', 'Working reduced'),
          ('cannot_work', 'Cannot work'),
          ('completely_incapacitated', 'Completely incapacitated')
        ] %}
        <option value="{{ val }}" {% if episode.functional_impairment == val %}selected{% endif %}>{{ label }}</option>
        {% endfor %}
      </select>
    </div>

    <hr class="divider">

    <div class="form-group">
      <label for="rescue_protocol">Rescue Protocol Used</label>
      <select id="rescue_protocol" name="rescue_protocol">
        <option value="">— none —</option>
        {% for opt in rescue_options %}
        <option value="{{ opt.name }}"
          {% if episode.rescue_protocol == opt.name %}selected{% endif %}
          {% if not opt.available %} class="option-unavailable"{% endif %}>
          {{ opt.name }}{% if not opt.available %} (unavailable){% endif %}
        </option>
        {% endfor %}
        {# Preserve a saved value that no longer exists in rescue options #}
        {% if episode.rescue_protocol and episode.rescue_protocol not in rescue_options|map(attribute='name')|list %}
        <option value="{{ episode.rescue_protocol }}" selected>{{ episode.rescue_protocol }}</option>
        {% endif %}
      </select>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="rescue_effectiveness">Rescue Effectiveness (1–10)</label>
        <div class="slider-wrap">
          <input type="range" id="rescue_effectiveness" name="rescue_effectiveness"
                 min="1" max="10" value="{{ episode.rescue_effectiveness or 5 }}">
          <span class="slider-value" id="rescue_effectiveness_display">{{ episode.rescue_effectiveness or 5 }}</span>
        </div>
      </div>
      <div class="form-group">
        <label for="time_to_relief_hours">Time to Relief (hours)</label>
        <input type="number" id="time_to_relief_hours" name="time_to_relief_hours"
               min="0" max="72" step="0.25"
               value="{{ episode.time_to_relief_hours or '' }}" placeholder="e.g. 1.5">
      </div>
    </div>

    <div class="form-group">
      <label for="notes">Notes</label>
      <textarea id="notes" name="notes" placeholder="Symptoms, context, observations…">{{ episode.notes or '' }}</textarea>
    </div>

    <div class="form-actions">
      <form class="delete-form" method="POST" action="{{ url_for('delete_episode', episode_id=episode.id) }}"
            onsubmit="return confirm('Delete this episode?')">
        <button type="submit" class="btn btn-danger">Delete Episode</button>
      </form>
      <div class="form-actions-primary">
        <a href="{{ url_for('episodes') }}" class="btn btn-secondary">Cancel</a>
        <button type="submit" class="btn btn-primary">Save Changes</button>
      </div>
    </div>
  </form>
</div>
{% endblock %}
