{% extends "base.html" %}
{% block title %}Edit Experiment — Baseline{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Edit Experiment</h1>
  <a href="{{ url_for('experiments') }}" class="btn btn-secondary">Cancel</a>
</div>

<div class="form-card">
  <form method="POST" id="experimentForm">
    <div class="form-group">
      <label for="name">Experiment name</label>
      <input type="text" id="name" name="name" required autofocus value="{{ experiment.name }}"
             data-charlimit="200">
      <div class="char-counter"><span id="name_count">0</span>/200</div>
    </div>

    <div class="form-group">
      <label for="protocol_id">Protocol being tested</label>
      <select id="protocol_id" name="protocol_id">
        <option value="">— select a protocol —</option>
        {% for p in preventatives %}
        <option value="{{ p.id }}" {% if experiment.protocol_id == p.id %}selected{% endif %}>{{ p.name }}{% if p.status != 'active' %} ({{ p.status }}){% endif %}</option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label for="hypothesis">Hypothesis <span style="font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
      <div class="field-hint">What outcome do you expect?</div>
      <textarea id="hypothesis" name="hypothesis" placeholder="I expect…"
                data-charlimit="500">{{ experiment.hypothesis or '' }}</textarea>
      <div class="char-counter"><span id="hypothesis_count">0</span>/500</div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="start_date">Start date</label>
        <div class="date-input-wrap">
          <input type="date" id="start_date" name="start_date"
                 value="{{ experiment.start_date.strftime('%Y-%m-%d') if experiment.start_date else '' }}">
          <button type="button" class="btn btn-today" onclick="document.getElementById('start_date').value=new Date().toLocaleDateString('en-CA'); updateAssessDate();">Today</button>
        </div>
      </div>
      <div class="form-group">
        <label for="stabilization_weeks">Stabilization period (weeks)</label>
        <div class="field-hint">How long before assessing?</div>
        <input type="number" id="stabilization_weeks" name="stabilization_weeks"
               min="1" max="52" value="{{ experiment.stabilization_weeks }}">
      </div>
    </div>

    <div id="assess-date-preview" class="assess-date-preview" style="display:none;">
      Assessment due: <strong id="assess-date-text"></strong>
    </div>

  </form>

  <div class="form-actions">
    <div></div>
    <div class="form-actions-primary">
      <a href="{{ url_for('experiments') }}" class="btn btn-secondary">Cancel</a>
      <button type="submit" form="experimentForm" class="btn btn-primary">Save Changes</button>
    </div>
  </div>
</div>

<script>
  function updateAssessDate() {
    var startVal = document.getElementById('start_date').value;
    var weeks = parseInt(document.getElementById('stabilization_weeks').value) || 3;
    var preview = document.getElementById('assess-date-preview');
    var dateText = document.getElementById('assess-date-text');
    if (startVal) {
      var d = new Date(startVal + 'T00:00:00');
      d.setDate(d.getDate() + weeks * 7);
      var opts = { year: 'numeric', month: 'short', day: 'numeric' };
      dateText.textContent = d.toLocaleDateString('en-US', opts);
      preview.style.display = 'block';
    } else {
      preview.style.display = 'none';
    }
  }
  document.getElementById('start_date').addEventListener('change', updateAssessDate);
  document.getElementById('stabilization_weeks').addEventListener('input', updateAssessDate);
  updateAssessDate();
</script>
{% endblock %}
