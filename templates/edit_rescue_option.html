{% extends "base.html" %}
{% block title %}Edit Rescue Option — Baseline{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Edit Rescue Option</h1>
  <a href="{{ url_for('protocols') }}" class="btn btn-secondary">Cancel</a>
</div>

<div class="form-card">
  <form method="POST" id="rescueOptionForm">
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required value="{{ option.name }}"
             data-charlimit="200">
      <div class="char-counter"><span id="name_count">0</span>/200</div>
    </div>

    <div class="form-group">
      <label for="notes">Notes</label>
      <textarea id="notes" name="notes"
                data-charlimit="500">{{ option.notes or '' }}</textarea>
      <div class="char-counter"><span id="notes_count">0</span>/500</div>
    </div>

    <div class="form-group">
      <label class="toggle-label">
        <input type="checkbox" name="available" value="1" {% if option.available %}checked{% endif %}>
        <span class="toggle-track"><span class="toggle-thumb"></span></span>
        Currently available
      </label>
    </div>
  </form>

  <div class="form-actions">
    <form class="delete-form" method="POST" action="{{ url_for('delete_protocol', protocol_id=option.id) }}"
          onsubmit="return confirm('Delete this rescue option?')">
      <button type="submit" class="btn btn-danger">Delete</button>
    </form>
    <div class="form-actions-primary">
      <a href="{{ url_for('protocols') }}" class="btn btn-secondary">Cancel</a>
      <button type="submit" form="rescueOptionForm" class="btn btn-primary">Save Changes</button>
    </div>
  </div>
</div>
{% endblock %}
