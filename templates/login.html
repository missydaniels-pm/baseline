<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log In — Baseline</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.json') }}">
  <meta name="theme-color" content="#0f0f13">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">Base<span>line</span></div>
    <h1 class="auth-title">Welcome back</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" class="auth-form">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="text" id="email" name="email" value="{{ email or '' }}"
               placeholder="you@example.com" autocomplete="email" autofocus>
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="Your password" autocomplete="current-password">
      </div>

      <div class="form-group">
        <label class="toggle-label" style="margin-bottom:0;">
          <input type="checkbox" name="remember">
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
          Remember me for 30 days
        </label>
      </div>

      <button type="submit" class="btn btn-primary auth-submit">Log in</button>
    </form>

    <div class="auth-footer">
      Have an invite code? <a href="{{ url_for('register') }}">Create an account</a>
    </div>
    <div class="auth-footer" style="margin-top:8px; font-size:13px;">
      <a href="{{ url_for('privacy') }}" style="color:var(--text-muted);">Privacy Policy</a>
    </div>
  </div>
</div>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').catch(function() {});
  }
</script>
</body>
</html>
