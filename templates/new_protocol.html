{% extends "base.html" %}
{% block title %}Add Preventative — Baseline{% endblock %}

{% block content %}
<div class="page-header">
  <h1 class="page-title">Add Preventative</h1>
  <a href="{{ url_for('protocols') }}" class="btn btn-secondary">Cancel</a>
</div>

<div class="form-card">
  <form method="POST">
    <div class="form-group">
      <label for="name">Name</label>
      <input type="text" id="name" name="name" required placeholder="e.g. Metformin, Vitamin D, Amitriptyline">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="dose_frequency">Dose / Frequency</label>
        <input type="text" id="dose_frequency" name="dose_frequency" placeholder="e.g. 25mg nightly">
      </div>
      <div class="form-group">
        <label for="start_date">Start Date</label>
        <input type="date" id="start_date" name="start_date">
      </div>
    </div>

    <div class="form-group">
      <label for="status">Status</label>
      <select id="status" name="status">
        <option value="active">Active</option>
        <option value="paused">Paused</option>
        <option value="stopped">Stopped</option>
      </select>
    </div>

    <div class="form-group">
      <label for="notes">Notes</label>
      <textarea id="notes" name="notes" placeholder="Side effects, observations, prescribing info…"></textarea>
    </div>

    <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:8px;">
      <a href="{{ url_for('protocols') }}" class="btn btn-secondary">Cancel</a>
      <button type="submit" class="btn btn-primary">Save</button>
    </div>
  </form>
</div>
{% endblock %}
